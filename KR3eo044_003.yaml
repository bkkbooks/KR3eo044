body:
  text: 卷三菜類韭菜味辛微酸性溫春食香益人夏食臭冬食動宿飲五月食之昏人乏力冬天未出土者名韭黃窖中培出者名黃芽韭食之滯氣蓋含抑鬱未伸之故也經霜韭食之令人吐多食昏神暗目酒後尤忌有心腹痼冷病食之加劇熱病後十日食之能發困不可與蜂蜜及牛肉同食成癥瘕食韭口臭啖諸糖可解薤味辛苦性溫滑一名蕌子其葉似細蔥中空而有稜其根如蒜有赤白二種赤者味苦白者生食辛熟食香發熱病不宜多食三四月勿食生者引涕唾不可與牛肉同食令人作癥瘕一云與蜂蜜相反蔥味辛葉溫根鬚平正月食生蔥令人面上起遊風多食令人虛氣上衝損鬚髮五臟閉絶昏人神為其生髮散開骨節出汗之故也生蔥同蜜食作下利燒蔥同蜜食壅氣殺人生蔥合棗食令人臚脹合雉肉雞肉犬肉食多令人病血同雞子食令氣短勿同楊梅食胡蔥久食傷神令人多忘損目明絶血脈發痼疾患狐臭蠚齒人食之轉甚同青魚食生蟲蛆四月勿食胡蔥令人氣喘多驚服地黃何首烏常山者忌食蔥忌諸蔥並與蜜相反小蒜味辛性溫有小毒其葉和煮食物其根比大蒜頭小而瓣少三月勿食傷人志性同魚膾雞子食令人奪氣陰核疼腳氣風病人及時病後忌食之一云與蜜相反生食增恚熟時發淫有損性靈也大蒜味辛性溫有毒生食傷肝氣損目光面無顏色傷肺傷脾生蒜合青魚鮓鯽魚食令人腹內生瘡腸中腫又成疝瘕發黃疾合蜜食殺人多食生痰助火昏目四八月食之傷神令人喘悖多食生蒜行房損肝失色凡服一切補藥及地黃牡丹皮何首烏者忌之能解蟲毒消肉積同雞肉食令瀉痢同雞子食令氣促勿同犬肉食妊婦食之令子目疾蕓薹菜味辛性溫即今之油菜多食發口齒痛損陽道發瘡疾生蟲積春月食之發膝中痼冷有腰腳病者食之加劇狐臭人並服補骨脂者忌食之菘菜味甘性溫即白菜多食發皮膚瘙癢胃寒人食多令噁心吐沫作瀉夏至前食多發風動疾有足病者忌食藥中有甘草忌食菘菜令人病不除北地無菘彼人到南方不勝地土之宜遂病忌菘菜其性當作涼生薑可解服蒼白朮者忌之芥菜味辛性溫多食昏目動風發氣同鯽魚食患水腫同兔肉鱉肉食成惡瘡病有瘡瘍痔疾便血者忌之生食發丹石藥毒細葉有毛者害人芥苔多食助火生痰發瘡動血酒後食多緩人筋骨芥子味辛性熱多食動火昏目泄氣傷精勿同雞肉食莧菜味甘性冷利多食發風動氣令人煩悶冷中損腹凡脾胃泄瀉者勿食同蕨粉食生瘕妊婦食之滑胎臨月食之易産不可與鱉同食生鱉瘕取鱉肉如豆大以莧菜封裹置土坑內以土蓋之一宿盡變成小鱉也菠菜味甘性冷滑多食令人腳弱發腰痛動冷氣先患腹冷者必破腹不可與䱉魚同食發霍亂北人食煤火薰炙肉面食此則平南人食濕熱魚米食此則冷令大小腸冷滑也萵苣菜味甘苦性冷微毒多食昏人目痿陽道患冷人不宜食紫色者有毒百蟲不敢近蛇虺觸之則目瞑不見物人中其毒以薑汁解之白苣菜味苦性寒似萵苣葉有白毛同酪食生蟲蠚多食令小腸痛患冷氣者勿食産後食之令腹冷作痛苦菜味苦性寒即苦蕒家種者呼為苦苣不可合蜜食令人作內痔脾胃虛寒者忌食蠶婦不可食令蛾子青爛野苣若五六回拗後味反甘滑勝於家種也萊蔔根辛甘葉微苦性溫即蘿蔔能解豆腐面毒不可與地黃同食令人發白多食動氣生薑可解服何首烏諸補藥忌食胡蘿蔔味甘辛性微溫有益無損宜食芫荽味辛性溫微毒即胡荽多食傷神健忘出汗有狐臭口氣䘌齒腳氣金瘡者並不可食久病人食之腳軟同斜蒿食令人汗臭難瘥根發痼疾凡服一切補藥及白朮牡丹皮者忌之勿同豬肉食妊婦食之令子難産茄子味甘淡性寒有小毒多食動風氣發痼疾及瘡疥虛寒脾胃弱者勿食諸病人莫食患冷人尤忌秋後食茄損目同大蒜食發痔漏多食腹痛下利女人能傷子宮無孕蔬中唯此無益芋艿味辛甘性平滑有小毒生則味蘞有毒不可食性滑下利服餌家所忌多食困脾動宿冷滯氣難克化紫芋破氣野芋形葉與家芋相似有大毒能殺人誤食煩悶垂死者以土漿及糞清大豆汁解之山藥味甘性溫平同鯽魚食不益人同麵食動氣入藥忌鐵器甘薯味甘性平茼蒿味甘辛性平多食動風氣薰人心令氣滿馬齒莧味酸性寒滑一名九頭獅子草俗名醬瓣草一種葉大者忌食妊婦食之令墮胎葵菜味甘性寒為百菜之長解丹石毒性冷滑利胃寒泄瀉者勿食同黍米食同鯉魚及魚鮓食並害人時病後食之令目暗勿同沙糖食妊婦食之令胎滑其菜心有毒忌食葉尤冷利不可多食莖赤葉黃者勿食生葵發宿疾與百藥相忌蜀葵苗亦可食但久食鈍人志性被犬齧者食之即發永不瘥也合豬肉食令人無顏色食蒜葵須用蒜無蒜勿食之葵性雖冷若熱食之令人熱悶動風氣四月勿食發宿疾蓴菜味甘性寒滑生湖澤中葉如荇而差圓形似馬蹄多食及熟食令擁氣不下損胃傷齒落毛髮令人顏色惡發痔瘡七月間有蠟蟲著上誤食令霍亂和醋食令人骨痿時病後勿食芹菜味辛甘性平殺丹石毒和醋食損齒有鱉瘕人不可食春秋二時宜防蛇虺遺精誤食令面手發青胸腹脹痛成蛟龍癥服餳糖二三碗日三度吐出便瘥種近水澤者良高田生者勿用一種赤芹有毒忌食水芹味辛甘性平生地上者名旱芹其性滑利一種黃花者有毒殺人即毛芹也赤芹生於水濱狀類赤芍藥其葉深緑而背甚赤其性溫味酸有毒胡芹生卑濕地三四月生苗一本叢出如蒿白毛蒙茸嫩時可茹其味甘辛性溫蛇喜嗜芹春夏之交防遺精於上誤食成蛟龍瘕和醋食令人損齒忌同芹菜茭白味甘淡性冷滑多食令下焦冷同生菜蜂蜜食發痼疾損陽道服巴豆人忌之刀豆子味甘性溫多食令人氣閉頭脹蕪菁味辛苦性溫即諸葛菜北地尤多春食苗夏食心秋食莖冬食根多食動風氣菾菜味甘苦性寒滑即甜菜一名莙薘菜道家忌之其莖燒灰淋汁洗衣白如玉色胃寒人食之動氣發瀉先患腹冷人食之必破腹苜蓿味苦澀性平多食令冷氣入筋中即瘦人同蜜食令人下痢落癸葉味酸性寒滑即胭脂菜脾冷人不可食曾被犬齧者食之終身不瘥黎豆味甘微苦性溫有小毒其子大如刀豆子淡紫色有斑點如貍文煮去黑汁再煮乃佳多食令人發悶白花菜味苦辛性涼一名羊角菜多食動風氣滯臟腑困脾發悶不可與豬心肺同食紅花菜味甘性平妊婦忌食黃花菜味甘性涼一名萱花黃瓜菜味甘微苦性涼其色黃其氣似瓜其菜形如薤馬蘭味辛性微溫醃藏作茹甚良草決明味甘性涼春採為蔬花子皆堪點茶蕹菜味甘性平難産婦人宜食解野葛毒取汁滴野葛苗當時萎死東風菜味甘性寒有冷積人勿食薺菜味甘性溫取其莖作挑燈杖可闢蚊蛾謂之護生草其子名蒫食味甘性平飢歲採之水調成塊煮粥其黏滑患氣病人食之動冷氣不與面同食令人背悶服丹石人不可食蘩蔞味酸性平一名鵝腸菜同魚鮓食發消渴病令人健忘性能去惡血不可久食恐血盡也蕺菜味辛性微溫有小毒一名魚腥草多食令人氣喘小兒食之三歲不行便覺腳痛素有腳氣人食之一世不愈久食發虛弱損陽氣消精髓蒲公英味甘性溫嫩苗可食解食毒一名黃花地丁草翹搖味辛性平即野蠶豆生食令人吐水鹿藿味甘性平即野緑豆生熟皆可食其子可煮食或磨面作餅蒸灰滌菜味甘性平殺刺毛蟲蜘蛛咬毒其子可磨粉炊飯秦荻藜味辛性溫於生菜中最稱香美香樁苗味甘辛性平多食昏神薰十二經脈同豬肉熱麵食多令人中滿五茄芽味甘辛性溫枸杞苗味甘苦性寒解面毒與乳酪相反甘菊苗味甘微苦性涼生熟可食真菊延齡野菊食之傷胃瀉人緑豆芽菜味甘性涼但受鬱抑之氣所生多食發瘡動氣竹筍味甘性微寒諸筍皆發冷血及氣多食難化困脾小兒食多成瘕同羊肝食令人目盲勿同沙糖食䈽筍味蘞難食多食發風動氣作脹淡竹筍多食發背悶腳氣刺竹筍有小毒食之落人發箭竹筍性硬難化小兒勿食桃竹筍味苦有小毒南人謂之黃筍灰汁煮之可食不爾戟人喉酸筍出粵南用沸湯泡去苦水投冷井水中浸二三日取出縷如絲繩醋煮可食凡煮筍少入薄荷食鹽則味不蘞或以灰湯煮過再煮乃佳蘆筍忌巴豆干筍忌沙糖鱘魚羊心肝食筍傷用香油生薑解之荊芥味辛性溫可作菜食久動渴疾燻人五臟神反驢肉無鱗魚勿與黃顙魚同食與蟹同食動風壺瓠味甘性平滑多食令人吐利發瘡疥患腳氣虛脹冷氣者食之永不除也壺盧味苦性寒有毒有甘苦二種俗謂以雞糞壅之或牛馬踏踐則變而為苦冬瓜味甘淡性寒經霜後食良陽臟人食之肥陰臟人食之瘦煮食能練五臟為下氣也冷者食之瘦人九月食之令人反胃陰虛久病及反胃者並忌食之白瓜子久食寒中南瓜味甘性溫多食髮腳氣黃疸同羊肉食令人氣壅忌與豬肝赤豆蕎麥麵同食菜瓜味甘淡性寒時病後不可食同牛乳魚鮓食併成疾生食冷中動氣食心痛臍下癥結多食令人虛弱不能行小兒尤甚發瘡疥空心生食令胃脘痛菜瓜能暗人耳目觀驢馬食之即眼爛可知其性矣黃瓜味甘淡性寒有小毒多食損陰血發瘧病生瘡疥積瘀熱發疰氣令人虛熱上逆患腳氣虛腫及諸病時疫之後不可食小兒尤忌滑中生疳蟲勿多用醋宜少和生薑制其水氣絲瓜味甘性冷多食令痿陽事滑精氣木耳味甘性平有小毒惡蛇蟲從下過者有大毒楓木上生者食之令人笑不止採歸色變者夜視有光者欲爛不生蟲者赤色及仰生者並有毒不可食唯桑槐榆柳樹上生者良柘木者次之其餘樹生者動風氣發痼疾令人肋下急損絡背膊悶不可合雉肉野鴨鵪鶉食中其毒者生搗冬瓜蔓汁並地漿可解香菌味甘性平感陰濕之氣而成善發冷氣多和生薑食良生山僻處者有毒殺人早英菌有毒不可食天花菌味甘性平五臺山多蛇菌感其氣而生故味雖美而無益煮時以金銀器試之不變黑者方可食之磨菰菌味甘性寒一云有毒不可多食動風氣發病勿同雉肉食雞㙡味甘性平出雲南土菌味甘性寒有毒槐樹上生者良野田中者有毒殺人多食發冷氣令人腹中微微痛發五臟風擁經脈動痔漏令人昏昏多睡背膊四肢無力冬春無毒夏秋有毒或有蛇蟲從下過也夜中有光者欲爛無蟲者煮之不熟者煮訖照人無影者上有毛下無紋者仰卷赤色者墳墓中生棺木上者並有毒殺人勿同雉肉鵪鶉食中其毒者地漿及糞汁解之煮菌時投姜屑飯粒若色黑者殺人否則無毒或以苦茗白礬勺新水咽下解之妊婦食之令子風疾廣南人殺毒蛇覆之以草以水灑之數日菌生採干為末入酒毒人遇再飲酒毒發立死又南夷以胡蔓草毒人至死懸尸於樹汁滴地上生菌子收之名菌藥毒人至烈此皆不可不知故並記之苦竹菌有大毒忌食羊肚菌味甘性寒患冷積腹痛泄瀉者勿食葛花菜味苦甘性涼産諸名山秋霜浮空如芝菌湧生地上色赤味脆亦菌類也地耳味甘性寒春夏生雨中雨後速採見日即不堪用俗名地踏菰石耳味甘性平味勝木耳鹿角菜味甘性大寒解面毒丈夫不可久食發痼疾損腰腎經絡血氣令人腳冷痹少顏色龍鬚菜味甘性寒患冷氣人勿食石花菜味甘鹹性大寒滑有寒積人食之令腹痛多食弱陽發下部虛寒紫菜味甘鹹性寒多食令人發氣腹痛有冷積者食之令吐白沫飲熱醋少許可解其中防小螺螄損人須揀淨用凡海菜皆然石蓴味甘性平似紫菜而色青凡海菜忌甘草海帶味甘鹹性寒滑不可與甘草同食海苔味甘鹹性寒多食發瘡疥令人痿黃少血色
