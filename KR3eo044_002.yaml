body:
  text: 卷二穀類粳米味甘北粳涼南粳溫赤粳熱白粳涼晚白粳寒新粳熱陳粳涼生性寒熟性熱新米乍食動風氣陳米下氣易消病人尤宜同馬肉食發痼疾同蒼耳食卒心痛急燒倉米灰和蜜漿調服不爾即死大人小兒嗜生米者成米瘕飯落水缸內久則腐腐則發泡浮水面誤食發惡瘡黃粱米味甘性平其穗大毛長不耐水旱名曰竹根黃其香美過於諸粱黃者出西洛白者出東吳青者出襄陽白青二粱味甘性微寒秈米味甘性溫陳廩米年久者其性涼炒則溫同馬肉食發痼疾香稻米味甘性軟其氣香甜紅者謂之香紅蓮其熟最早晚者謂之香稻米糯米味甘性溫多食發熱壅經絡之氣令身軟筋緩久食發心悸及癰疽瘡癤中痛同酒食之令醉難醒糯性黏滯難化小兒病人更宜忌之妊婦雜肉食之令子不利生瘡疥寸白蟲馬食之足重小貓犬食之腳屈不能行人多食令發風動氣昏昏多睡同雞肉雞子食生蛔蟲食鴨肉傷者多飲熱糯米泔可消稷米味甘性寒關西謂之縻子米又名穄米早熟清香一名高粱即黍之不黏者多食發二十六種冷氣病不可與瓠子同食發冷病但欲黍穰汁即瘥又不可與附子烏頭天雄同服勿合馬肉食黍米味甘性溫即稷之黏者黍有五種多食閉氣久食令人多熱煩發痼疾昏五臟令人好睡緩筋骨絕血脈小兒多食令久不能行小貓犬食之其腳跼屈合葵菜食成痼疾合牛肉白酒食生寸白蟲赤者浙人呼為紅蓮米又謂之赤蝦米丹黍米味甘性微溫多食難化勿同蜂蜜及葵菜食醉臥黍穰令人生厲蜀黍味甘澀性溫高大如蘆荻一名蘆粟黏者與黍同功種之可以濟荒可以養畜梢堪作箒莖可織箔席編籬供爨其穀殼浸水色紅可以紅酒博物志云地種蜀黍年久多蛇玉蜀黍即番麥味甘性平粟米味鹹性微寒即小米也生者難化熟者滯氣隔宿食生蟲胃冷者不宜多食粟浸水至敗者損人與杏仁同食令人吐瀉雁食粟足重不能飛能解小麥毒秫米味甘性微寒即粟之黏者久食壅五臟氣動風迷悶性黏滯易成黃積病小兒不宜多食傷鵝鴨成瘕者多飲秫米泔可消稗子米味辛甘苦性微寒能殺蟲煮汁不可沃地螻蚓皆死穇子米味甘澀可食芮米味甘性寒生水田中苗子似小麥而小四月熟狼尾草米味甘性平生澤地似茅作穗蒯草米味甘性平苗似茅可織蓆為索東牆子米味甘性平蔓生如葵子六月種九月收牛食之尤肥蓬草子米味酸澀性平生湖澤中篩草子米一名自然谷味甘性平七月熟生海洲食之如大麥菰米味甘性冷九月抽莖開花如葦芍結實長寸許霜後採之米白滑膩作飯香脆此皆儉年之谷食之可以濟飢也糵米味甘苦性溫即發芽谷也與麥芽同功粃糠味甘性平年荒亦可充飢大麥味鹹性涼為五穀之長不動風氣可久食暴食似腳弱為下氣也熟則有益生冷損人炒食則動脾久小麥味甘麥性涼面性熱麩性冷曲性溫北麥日開花無毒南麥夜開花有微毒面性壅熱小動風氣發丹石毒多食長宿癖加客氣勿同粟米枇杷食凡食麵傷以萊菔漢椒消之寒食日用紙袋盛面懸風處熱性皆去數十年久留不壞入藥尤良新麥性熱陳麥平和服土茯苓威靈仙當歸者忌濕面麩中洗出麵筋味甘性涼以油炒煎則性熱矣多食難化小兒病人勿食蕎麥味甘性寒脾胃虛寒者食之大脫元氣落眉發多食難消動風氣令人頭眩作面和豬羊肉熱食不過八九頓即患熱風鬚眉脫落還生亦希涇邠以北人多此疾勿同雉肉黃魚食與諸礬相反近服蠟礬等丸藥者忌之誤食令腹痛致死蕎麥穰作薦闢壁蝨苦蕎麥味甘苦性溫有小毒多食傷胃發風動氣能發諸病黃疾人尤當忌之𪍿麥味甘性微寒暴食似腳軟動冷氣久即益人作糵用溫中消食雀麥味甘性平亦可救荒充飢滑腸胡麻味甘性平即黑脂麻修制蒸之不熟令人發落泄瀉者勿食白芝麻味甘生性寒熟性熱蒸熟者性溫多食滑腸抽人肌肉霍亂及泄瀉者勿食其汁停久者飲之發霍亂亞麻味甘性微溫即壁蝨胡麻也其實亦可榨油點燈但氣惡不可食大麻子仁味甘性平即火麻子也先藏地中者食之殺人多食損血脈滑精氣痿陽道婦人多食即髮帶疾食須去殼殼有毒而仁無毒也黑大豆味甘性平煮食則涼炒食則熱作腐則寒作豉則冷造醬及生黃卷則平牛食之溫馬食之涼多食發五臟結氣令人體重豬肉同食令生內疾小兒同炒豆豬肉並食令壅氣腹痛難止致死十有八九年十歲以上者不畏也服蓖麻子者忌炒黑豆犯之脹滿致死服厚朴者忌之動氣也小黑豆味甘苦性溫黃大豆味甘生性溫炒性熱微毒多食壅氣生痰動嗽發瘡疥令人面黃體重不可同豬肉食小青豆赤白豆性味相似並不可與魚及羊肉同食赤豆味甘酸性平同鯉魚鮓食令肝黃成消渴同米煮飯及作醬食久發口瘡驢食足輕人食身重以其逐精液令肌瘦膚燥也赤小豆味甘辛性平下行不可同魚鮓食久服則降令太過使津血滲泄令人肌瘦身重凡色赤者食之助熱損人豆粉能去衣上油跡花名腐婢解酒毒食之令人多飲不醉綠豆味甘性寒宜連皮用去皮則令人少壅氣蓋皮寒而肉平也反榧子害人合鯉魚鮓食久令人肝黃成渴病花解酒毒扁豆味甘性微溫患冷氣及寒熱病者勿食蠶豆味甘微辛性平多食滯氣成積發脹作痛雲南豆味甘性溫有毒煮食味頗佳多食令人寒熱手足心發麻急嚼生薑解之此從雲南傳種地土不同不識制用食之作病豇豆味甘鹹性平水種者勿食中鼠莽毒者煮汁飲之即解欲試其效先刈鼠莽苗以汁潑之便根爛不生豌豆味甘性平多食發氣病薇味甘性寒即野豌豆御米味甘性平多食利二便動膀胱氣此即罌粟子也薏苡仁味甘性微寒因寒筋急不可食用以其性善走下也妊婦食之墮胎蕨粉味甘性寒生山中者有毒多食令目暗鼻塞落髮弱陽病人食之令邪氣壅經絡筋骨患冷氣人食之令腹脹小兒食之令腳軟不能行生食蕨粉成蛇瘕能消人陽事非良物也勿同莧菜食
