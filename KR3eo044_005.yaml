body:
  text: 卷五味類鹽味鹹性寒多食傷肺發咳令失色損筋力患水腫者喘嗽者忌食喜咸人必膚黑血病無多食鹽多食則脈凝澀而變色鹽中多以礬硝灰石之類雜穢須水澄復煎乃佳河東天生者及曬成者無毒其煎煉者不潔有毒一種戎鹽功用相同凡飲食過多作脹以鹽擦牙溫水漱咽二三次即消烏賊魚骨能淡鹽服甘遂藥者忌之用鹽擂椒味佳豆油味辛甘性冷微毒多食困脾發冷疾滑骨髓菜油功用相同麻油味甘辛性冷多食滑腸胃發冷疾久食損人肌肉生性冷熟性熱可隨時熬用凡經宿者食之動風若過於煎熬者性極熱勿用黑沙糖味甘性溫多食令人心痛生長蟲消肌肉損齒髮疳同鯽魚食生疳蟲同葵菜食成流癖同筍食成瘕令身重不能行令人每用為調和徒取其適口而不知陰受其害也白沙糖味甘性寒多食助熟損齒生蟲輕白如粉者為糖霜堅白如冰者為晶糖性味相同蜂蜜味甘性微溫多食動脾凡取蜜夏冬為上秋次之春則易發酸川蜜溫閩廣性熱西南蜜涼色白味甜七月勿食生蜜令人暴下霍亂青赤酸者食之心煩與李子生蔥韭薤萵苣同食令人利下勿同黍米食食蜜飽後不可食鮓令人暴亡多食發濕熱病生蟲𧈟小兒尤宜少食凡蜜錢諸果用細辛置於頂不蟲蛇薄荷味辛性涼虛弱人久食成消渴病新病初愈食之令虛汗不止與鱉相反貓食之醉凡收薄荷者須隔夜以糞水澆之雨後乃可刈收則性涼不爾不涼也蓽茇味辛性熱能動脾肺之火多食令人目昏食料不宜用之草豆蔻味辛澀性溫多食能助脾熱傷肺損目不如縮砂仁白豆蔻之性氣和也紅豆蔻味辛性溫多食令人舌粗不思飲食最能動火傷目致衄食料中不宜用之食茱萸味辛苦性大熱多食動脾火發浮腫虛恚發瘡痔有目疾火證者忌食勿同茨菰食川椒味辛性熱有毒多食令人乏氣傷血脈凡有實熱喘以嗽及暴赤火眼者勿食椒五月食椒損氣傷心令人多忘閉口者殺人中其毒者用涼水麻仁漿解之川椒肉厚皮皺其子光黑如人子瞳他椒子雖黑而無神土椒子則無光矣花椒性味相同但力差薄耳胡椒味辛性大熱有毒多食損肺令人吐血助火昏目發瘡有實火及熱病人食之動火傷氣陰受其害病咽喉口齒及腸紅痔漏者忌之妊婦食之令助胎熱子生瘡疥小茴香味辛甘性微溫力緩於大茴有實火人宜少食之其莖葉與子性味相同蒔蘿味辛性溫殺魚肉毒有實熱者少食其根有大毒誤食殺人桂皮味辛性溫有實火者少食忌生蔥石脂茶味苦而甘茗性大寒岕性微寒久飲令人瘦去人脂令人不睡大渴及酒後飲茶寒入腎經令人腰腳膀胱冷痛兼患水腫攣痹諸疾尤忌將鹽點茶或同鹹味食如引賊入腎空心切不可飲同棐食令人身重飲之宜熱冷飲聚痰宜少勿多不飲更妙酒後多飲濃茶令吐食茶葉令發黃成癖唯蒙茶性溫六安湘潭茶稍平松茗傷人為最若雜入香物令病透骨況真茶即少雜茶更多民生日用受其害者豈可勝言婦嫗蹈其弊者更甚服威靈仙土茯苓者忌之服史君子者忌飲熱茶犯之即瀉茶子搗仁洗衣去油膩廣南一種苦䔲性大寒胃冷人勿食酒類甚多其味有甘苦酸淡辛澀不一其性皆熱有毒多飲助火生痰昏神軟體損筋骨傷脾胃耗肺氣夭人壽飲冷酒同牛肉食令人生蟲同乳飲令人氣結同胡桃食令咯血酒醉臥黍穰食豬肉患大風酒同芥食及合辛辣等物緩人筋骨酒後飲茶多傷腎聚痰成水腫及攣痛腰腳重墜膀胱疝證腹下冷痛消渴痰飲久飲過度令人精薄無子醉臥當風成癜風癱瘓醉後浴冷水成痛痹凡用酒服丹砂雄黃等藥能引藥毒入四肢滯血化為癰疽中一切砒蠱等毒從酒得者不治凡飲酒宜溫不宜熱宜少不宜多飲冷酒成手戰有火證目疾失血痰嗽痔漏瘡疥者並宜忌之飲酒者喜咸惡甘勿同甜物食枳椇葛花赤豆花緑豆粉皆能醒酒解毒酒漿照人無影及祭酒自耗者勿飲酒酸以赤小豆一升炒焦入罐內可變好燒酒味甘辛性大熱有毒多飲敗胃傷膽潰髓弱筋傷神損壽有火證者忌之同薑蒜犬肉食令人生痔發痼疾妊婦飲之令子驚癇過飲發燒者以新汲冷水浸之或浸發即醒中其毒者服鹽冷水緑豆粉可少解或用大黑豆一升煮汁一二升多飲服之取吐便解酒糟味辛甘性溫臘月者可久留有火熱病及喘嗽者勿食糟物醋味酸甘苦性微溫解魚肉瓜菜毒米醋乃良多食損筋骨傷胃氣不宜男子損齒滅顏能發毒不可同諸藥食服茯苓丹參葶藶藥者忌之凡風寒咳嗽及瀉痢脾病者勿食醬味鹹甘性冷殺魚肉菜菌百藥毒多食助濕發瘡發小兒無辜生痰動氣妊婦合雀肉食令兒面黑同葵藿食能墮胎麥醬同鯉魚及魚鮓食生口瘡患腫脹五疸咳嗽者勿食豆醬乃佳患瘡癤者食之令瘢黑服甘遂者忌之飴糖味甘性溫多食生痰助火動脾風發濕熱患中滿吐逆祕結牙𧈟赤目疳病者切忌食之勿同豬心肺食服半夏菖蒲者忌之豆腐味甘鹹性寒多食動氣作瀉發腎邪及瘡疥頭風病夏月少食恐人汗入內凡傷豆腐及中毒者食萊蔔杏仁可解粉皮索粉俱味甘性涼脾胃虛弱者多食難化令腹痛泄瀉食杏仁即消如近杏仁即爛不成索乳酪味甘酸性寒患脾痢者勿食羊乳酪同魚鮓食成瘕忌醋不可合鱸魚食酥油味甘性微寒患脾氣虛寒者宜少食之乳餅味甘性微寒多食動氣滑腸生痰患泄瀉者不宜食魚膘味甘鹹性平脾胃虛者宜少食之回魚者性寒不益腎魚膾味甘性溫同乳酪食令霍亂勿同諸瓜食夜食不消成積食後飲冷水生蟲疫病後食之損脾成內疾食生鱠成瘕為怪病過食不消者用馬鞭草汁和酒服可化勿同豬肝食魚酢味甘鹹性平諸魚皆可作酢多食難化發瘡疥防雜發害人生酢損人食之動脾胃病同胡荽同葵菜同豆藿同麥醬同緑豆同蒜食並令消渴及霍亂無鱗魚鮓尤不益人生薑味辛甘肉性溫皮性寒生髮散熟溫中多食損心氣發目疾五痔失血凡患瘡癤人食之長惡肉妊婦多食生薑助胎熱令子生瘡疥或生多指多食辛辣皆能損胎夜不食薑免耗真氣忌同豬肉牛肉馬肉兔肉食秋薑宜少食能瀉氣夭年乾薑久食令人目暗妊婦食之令胎內消蓋其性大熱而辛散也糟老薑入蟬蛻則無筋
