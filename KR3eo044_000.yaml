front:
  text: 序飲食藉以養生而不知物性有相反相忌叢然雜進輕則五內不和重則立興禍患是養生者亦未嘗不害生也歷觀諸家本草疏注各物皆損益相半令人莫可適從茲專選其反忌匯成一編俾尊生者日用飲食中便於檢點耳華山老人識
