body:
  text: 卷一水火天雨水味甘淡性冷暴雨不可用淫雨及降注雨謂之潦水味甘薄立春節雨水性有春升始生之氣婦人不生育者是日夫婦宜各飲一杯可易得孕取其發育萬物之義也梅雨水味甘性平芒種後逢壬為入梅小暑後逢壬為出梅須淬入火炭解毒此水入醬易熟沾衣易爛人受其氣生病物受其氣生黴忌用造酒醋浣垢如灰汁入梅葉煎湯洗衣黴其斑乃脫液雨水立冬後十日為入液至小雪為出液百蟲飲此皆伏蟄宜制殺蟲藥餌又謂之藥雨臘雪水味甘性冷冬至後第三戊為臘密封陰處數年不壞用此水浸五穀種則耐旱不生蟲酒席間則蠅自去淹藏一切果食永不蟲蛀春雪日久則生蟲不堪用亦易敗壞冰味甘性大寒止可浸物若暑月食之不過暫時爽快入腹令寒熱相激久必致病因與時候相反非所宜也服黃連胡黃連大黃巴豆者忌之露水味甘性涼百花草上露皆堪用秋露取之造酒名秋露白香冽最佳凌霄花上露入目損明半天河水即竹籬頭及空樹穴中水也久者防有蛇蟲毒屋漏水味苦性大寒有大毒誤飲生惡瘡滴脯肉中人誤食之成瘕又簷下雨水入菜有毒亦勿誤食冬霜味甘性寒收時用雞羽掃入瓶中密封陰處久留不壞冰雹水味鹹性冷有毒人食冰雹必患瘟疫風癲之證醬味不正取一二升納甕中即還本味方諸水味甘性寒一名明水方諸以銅錫相半所造謂之鑑燧之劑非蚌非金石摩熱向月取之得水二三合似朝露千里水即遠來活水從西來者謂之東流水味甘性平順流水其性順遂而下流急流水其性急速而下達逆流水其性洄瀾倒逆而上行勞水即揚泛水又謂之甘瀾水用流水二斗置大盆中以杓高揚千萬遍有沸珠相聚乃取煎藥蓋水咸而體重勞之則甘而輕井水味有甘淡咸之異性涼凡井水遠從地脈來者為上如城市人家稠密溝渠汙水雜入井中者不可用須煎滾澄清候鹼穢下墜取上面清水用之如雨渾濁須擂桃杏仁連汁投入水中攪勻片時則水清矣易曰井泥不食慎之凡井以黑鉛為底能清水散結人飲之無疾入丹砂鎮之令人多壽平旦第一汲為井華水取天一真氣浮於水面煎滋陰劑及煉丹藥用阿井水味甘鹹氣清性重節氣水一年二十四節氣一節主半月水之氣味隨之變遷天地氣候相感非疆域之分限正月初一至十二日以一日主一月每旦取初汲水瓶盛稱輕重重則主此月雨多輕則主此月雨少立春清明二節貯水曰神水宜制丸散藥酒久留不壞穀雨水取長江者良以之造酒儲久色紺味冽端午日午時取水合丹丸藥有效五月五日午時有雨急伐竹竿中必有神水瀝取為藥小滿芒種白露三節內水並有毒造藥釀酒醋及一切食物皆易敗壞人飲之亦生脾胃疾立秋日五更井華水長幼各飲一杯卻瘧痢百病寒露冬至小寒大寒四節及臘日水宜浸造滋補丹丸藥酒與雪水同功山岩泉水味甘性寒凡有黑土毒石惡草在上者勿用瀑湧激湍之水飲令人頸疾昔潯陽忽一日城中馬死數百詢之因雨瀉出山谷蛇蟲毒水馬飲之而死乳穴水味甘性溫稱之重於他水煎之似鹽花起此真乳穴液也取飲與鐘乳石同功山有玉而草木潤近山人多壽皆玉石津液之功所致溫泉味辛性熱不可飲下有硫黃作氣浴之襲人肌膚水熱者可燖豬羊毛能熟蛋廬山有溫泉池飽食方浴虛人忌之新安黃山硃砂泉春時水即微紅色可煮茗長安驪山礐石泉不甚作氣硃砂泉雖微紅似雄黃而不熱有砒石處湯泉浴之有毒慎之海水性涼秋冬味鹹春夏味淡碧海水味鹹性微溫有小毒夜行海中撥之有火星者鹹水也其色碧故名碧海鹽膽水即鹽滷味鹹苦有大毒凡六畜飲一合即死人飲亦然今人用之點豆腐煮四黃釬物服丹砂者忌之古冢中水性寒有毒誤食殺人糧罌中水味辛有毒乃古冢中食罌中水也洗眼見鬼多服令人心悶磨刀水洗手令生癬地漿掘地作坎以新汲水沃攪令濁少頃澄清服之解中毒煩悶及一切魚肉果菜菌毒漿水炊粟米熱投冷水中浸五六日成此水浸至敗者損人同李食令霍亂吐利醉後飲令失音妊婦食之令兒骨瘦水漿尤不可多飲令絶産齏水味酸鹹性涼能吐痰飲宿食婦人食多絶産甑氣水味甘鹹知瘡所在能引藥至患所熟湯煎百沸者佳勿用滾熱湯漱口損齒病目人勿用熱湯沐浴助熱昏目凍僵人勿用熱湯濯手足脫指甲勿用銅器煎湯人誤飲損聲勿飲半滾水令人發脹損元氣生熟湯冷水滾湯相和者又謂之陰陽水凡人大醉及食瓜果過度以生熟湯浸身其湯皆作酒氣瓜果味博物志云浸至腰食瓜可五十枚至頸則無限也未知確否諸水有毒人感天地氤氳而産育資稟山川之氣相為流連其美惡壽夭亦相關涉金石草木尚隨水土之性況人為萬物之靈乎貪淫有泉仙壽有井載在往牒必不我欺淮南子云土地各以類生人是故山氣多男澤氣多女水氣多喑風氣多聾林氣多蔭木氣多傴下氣多腫石氣多力險氣多癭暑氣多夭寒氣多壽穀氣多痹丘氣多狂廣氣多仁陵氣多貪堅土人剛弱土人脆壚土人大沙土人細息土人美耗土人醜輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重皆應其類也又河圖括地象云九州殊題水泉剛弱各異青州角徵會其氣慓輕人聲急其泉酸以苦梁州商徵接其氣剛勇人聲塞其泉苦以辛兗豫宮徵會其氣平靜人聲端其泉甘以苦雍冀商羽合其氣壯烈人聲捷其泉甘以辛人之形賦有厚薄年壽有短長由水土資養之不同驗諸南北人物之可見水之有毒而不可犯者亦所當知水中有赤脈不可斷井中沸溢不可飲三十步內取青石一塊投之即止古井眢井不可入有毒殺人夏月陰氣在下尤忌用雞毛試投旋舞不下者有毒投熱醋數斗可入古冢亦然古井不可塞令人聾盲陰地流泉有毒二八月行人飲之成瘴瘧損腳力澤中停水五六月有魚鱉遺精誤飲成瘕沙河中水欲之令人喑兩山夾水其人多癭流水有聲其人多瘦花瓶水誤飲殺人臘梅尤甚銅器內盛水過夜不可飲炊湯洗面令人無顏色洗體令人生癬洗足令疼痛生瘡銅器上汗誤食生要疽冷水沐頭熱泔沐頭並令頭風女人尤忌經宿水面有五色者有毒勿洗手時病後浴冷水損心胞盛暑浴冷水令傷寒病汗後入冷水令人骨痹産後當風洗浴發痓病多死酒中飲冷水令手戰酒後飲冷茶湯成酒癖飲水便睡成水癖夏月遠行勿以冷水洗足冬月遠行勿以熱水濯足小兒就瓢瓶飲水令語訥燧火人之資於火食者疾病壽夭系焉四時鑽燧取新火依歲氣而無亢榆柳先百木而青故春取之杏棗之木心赤故夏取之柞楢之木理白故秋取之槐檀之木心黑故冬取之桑柘之木肌黃故季夏取之桑柴火宜煎一切補藥勿煮豬肉及鰍鱓魚不可炙艾傷肌灶下灰火謂之伏龍屎不可爇香祀神艾火宜用陽燧火珠承日取太陽真火其次則鑽槐取火為良若急卒難備用真麻油燈或蠟燭火以艾莖燒點於炷滋潤炎瘡至愈不痛也其戛金擊石鑽燧八木之火皆不可用八木者松火難瘥柏火傷神多汗桑火傷肌肉柘火傷氣脈棗火傷內吐血橘火傷營衛經絡榆火傷骨失志竹火傷筋損目也
