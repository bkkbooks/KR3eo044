body:
  text: 卷七禽類鵝肉味甘性寒蒼鵝性冷有毒嫩鵝有毒多食令人霍亂發痼疾生瘡疥患腫毒者勿食火熏者尤毒虛火咳嗽者勿食鵝血味鹹微毒鵝卵味甘性溫多食鵝卵發痼疾煮鵝下櫻桃葉數片易軟鴨肉味甘性寒黑鴨有毒滑中發冷利患腳氣人忌食之新鴨有毒以其多食蚯蚓等蟲也目白者殺人腸風下血人不可食鴨鴨血味鹹性冷解諸藥毒鴨卵味甘鹹性微寒多食發冷氣令人氣短背悶妊婦多食令子失音且生蟲小兒多食令腳軟患瘡毒人食之令惡肉突出不可合鱉肉李子食害人合桑椹食令妊婦生子不順過食鴨肉所傷成瘕者以糯米泔溫服一二盞漸消雞肉味甘酸性微溫善發風助肝火同葫蒜芥李及兔犬肝犬腎食並令人瀉痢同魚汁食成心瘕同鯉魚鯽魚蝦子食成癰癤同獺肉食成遁屍病同生蔥食成蟲痔同糯米食生蝤蟲小兒食多腹內生蟲五歲以下忌食四月勿食抱雞肉令人作癰成漏男女虛乏有風病人食之無不立發勿同野雞鱉肉食黃雌雞患骨蒸熱者勿食雞有五色者元雞白首者六指者四距者雞死足不伸者閹雞能啼者並有毒食之害人老雞頭有毒勿食雞肝味甘苦性溫微毒內則云食雞去肝為不利人雞卵味甘性平微寒多食令腹中有聲動風氣同蔥蒜食令氣短同韭食成風痛同鱉肉食損人同獺肉食成遁屍病同兔肉食成瀉痢妊婦多食令子失音以雞子鯉魚同食令兒生瘡同糯米食令兒生寸白蟲同魚膾同乾薑食令子生疳發瘡疥小兒患痘疹者不唯忌食禁嗅其煎食之氣恐生翳膜也醋能解蛋毒過食蛋傷紫蘇子能消人踏抱出雞子殼令生白癜風野鴨味甘性涼不可同胡桃木耳豆豉食野雞味酸甘性微寒春夏有小毒患痢人不可食久食令人瘦發五痔諸瘡疥同蕎麥麵食生肥蟲同菌蕈木耳食發五痔立下血同胡桃食發頭風眩暈及心痛損多益少不可常食卵同蔥食生寸白蟲同家雞食成遁屍病自死爪甲不伸者食之殺人不可與鹿肉豬肝鯽魚鮎魚回魚同食鵓鵒肉味甘鹹性平食多減一切藥力其血解百藥蠱毒不可與麞肉同食雀肉味甘性溫勿同豬肝及李食妊婦食雀肉飲酒令子多淫多食雀腦動胎氣令子雀目同豆醬食令子面皯服術人忌之鶉肉味甘性平不可同豬肝食令人生黑子同木耳菌子食令人發痔鶉毛有斑點善搏鬥始由蝦蟆黃魚所化終以卵生四時常有鵪肉與鶉性味相同形亦相似但色黑無斑始由鼠化終復為鼠夏有冬無今通呼為鵪鶉也鷓鴣肉味甘性溫不可與竹筍同食令人小腹脹或言此鳥天地之神每月取一隻饗至尊所以自死者不可食其鳥飛必南翅雁肉味甘性平七月勿食傷人神道家謂之天厭不食為妙久食動氣禮記云食雁去腎不利人也鵽鳩肉味甘性熱即突厥雀形似雌雉鼠腳無後趾岐尾憨急群飛雌前雄後鸐雉肉味甘性平有小毒多食令人瘦發五痔同蕎麥麵食生肥蟲同豆豉食害人卵同蔥食生寸白蟲一名山雞山雞有四種似雉而尾長三四尺者為鸐雉似鸐而尾長五六尺能走且鳴者為鷮雉俗通呼鸐矣似鸐而小首有采毛為鵔鸃似雉而腹有采色為錦雞俗通呼為錦雞矣又有吐綬雞每春夏晴明徐舒頷下錦綬文采煥爛斂即不見養之並闢火災食之有毒鶡雞肉味甘性平初病後勿食鶡氣猛鬥期必死白鷳肉味甘性平患瘡癤者勿食黑鷳氣味相同竹雞肉味甘性平即泥滑滑諺云家有竹雞啼白蟻化為泥亦闢壁蝨英雞肉味甘性溫常食石英秋月即無黃褐侯肉味甘性平即青佳多食發喉痹用生薑可解桑鳸肉味甘性溫即蠟嘴初病後勿食鸜鵒肉味甘性平即八哥天寒欲雪即群飛如告鸜鵒不逾濟地氣使然也烏鴉肉味酸澀性平羶臭不可食肉及卵食之令人昏志喜鵲肉味甘性寒婦人不可食燕肉味酸性平有毒不可食損人神氣不宜殺之嗜燕人入水為蛟龍所吞燕作窩長能容二匹絹者令人家富也窩穴北向尾屈色白者是數百歲燕仙經謂之肉芝刺毛鶯肉味甘性平有瘡疥者少食孔雀肉味鹹性涼微毒食其肉者自後服藥必不效為其解毒也尾有毒不可入目令人昏翳鶚即魚鷹能啖蛇其肉腥惡不可食鴟腦有毒同酒食令人久醉健忘鶴肉有毒頂血飲之立死性喜食蛇蛇聞聲而遠去人家畜之以闢蛇鸛肉有毒不可食其骨入沐湯浴頭令發盡脫更不生也又能殺樹木鸛生三子一為鶴巽極成震陰變陽也鴛鴦肉味鹹性平有小毒多食令人患大風病鸕鷀肉味酸鹹性冷微毒即水老鴉凡魚骨梗者密念鸕鷀不已即下妊婦食之令逆生貓頭鷹夜勿煮炙能引鬼魅諸鳥有毒凡鳥自死自閉自死足不伸白鳥元首元鳥白首三足六指異形異色四翼肝色青者野禽生卵有八字形者並有毒食之殺人
