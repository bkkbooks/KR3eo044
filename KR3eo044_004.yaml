body:
  text: 卷四果類李子味甘酸性微溫多食令人臚脹發痰瘧虛熱同蜜及雀肉雞肉雞子鴨肉鴨子食損五臟同漿水食令霍亂勿同麋鹿麞肉食李味苦澀者不可食不沉水者有毒勿食服術人忌之妊婦服之子生瘡疥杏子味甘酸性熱有小毒不益人生食多傷筋骨多食昏神令膈熱生痰動宿疾發瘡癰落鬚眉病目者食多令目盲小兒多食成壅熱致瘡癤産婦尤宜忌之杏仁味甘苦性溫有小毒兩仁者殺人花開六出核必雙仁杏仁作湯白沫不解者食之令氣壅身熱湯經宿者動冷氣能消犬肉索粉積雙仁者誤食或食杏仁多致迷亂將死急取杏根煎湯服可解八旦杏仁味甘性溫多食亦能動宿疾也桃子味甘酸性溫微毒多食損脾助熱令膨脹發瘡癤同鱉肉食患心痛食桃浴水令泄瀉成淋及寒熱病能發丹石毒生桃尤損人食之有損無益五果列桃為下服術人忌之桃仁味甘苦性平雙仁者有毒宜去之桃花勿用千葉者令人目黃鼻衄不止栗子味甘鹹性溫生食則發氣蒸炒熱食則壅氣風過者生熟咸宜再經日曬作油灰氣同橄欖食有梅花香中扁者名栗楔栗作粉食勝於菱芡但飼小兒令齒不生患風疾及水腫者並不宜食小兒不可多食生則難化熟則滯氣膈熱生蟲往往致病勿同牛肉食密取一栗咬破蘸香油和衆栗炒俱不發爆取苞中自裂出栗子以潤沙密藏夏初尚如新也如苞未樹上自墜者不能久藏且易腐棗子味甘生性熱熟性平生食多令人熱渴膨脹動臟腑損脾元助濕熱患寒熱胃弱羸瘦人不可食同蜜食損五臟熟棗多食令人齒黃生䘌同蔥食令五臟不和同諸魚食令腰腹痛勿與鱉蟹同食久食最損脾助濕熱患齒病疳病蟲䘌及中滿者勿食小兒食多生疳棗葉微毒服之使人瘦久即嘔吐柿子味甘性寒多食發痰同酒食易醉或心痛欲死同蟹食令腹痛作瀉或嘔吐昏悶唯木香磨汁灌之可解鹿心柿尤不可食令寒中腹痛乾柿勿同鱉肉食難消成積凡紅柿未熟者以冷鹽湯浸可經年許但鹽藏者微有毒梅子味酸性平多食損齒傷筋蝕脾胃令人膈上痰熱服黃精人忌之不可與豬羊肉麋鹿麞肉同食食梅齒齼者嚼胡桃肉解之梅子同韶粉食不酸不軟牙烏梅性溫忌豬肉白梅與烏梅同功暗香湯取半開梅花溶蠟封花口投蜜罐中每取一二朵同蜜一匙點滾水服清水揉梅葉洗蕉葛衣經夏不脆梅葉煎湯洗黴衣即去甚妙梨味甘微酸性寒多食令人寒中損脾萎困金瘡乳婦産後血虛者勿食生食多成冷痢梨與蘿蔔相間收藏或削梨蒂種於蘿蔔上藏之皆可經年不爛今北人每於樹上包裹過冬乃摘亦妙木瓜味酸澀性溫忌鐵器多食損齒傷骨以鉛霜或胡粉塗之則失酢味且無渣木瓜樹作桶濯足甚益人榲桲味酸甘性微溫形似木瓜而有毛其氣甚香多食發熱毒澀血脈聚胸膈痰同車螯食發疝氣臥時生食多令胃脘痁塞棠毬味酸甘性微溫生食多令人嘈煩易飢脾胃弱者及齒齲人勿食奈子味苦甘酸澀性寒微毒多食令人肺寒臚脹凡病人食之尤甚蘋果味甘性平一名頻婆比奈圓大味更風美林檎味甘酸性溫俗名花紅多食令人百脈弱發熱生痰滯氣發瘡癤令人好唾其子食之令人心煩林檎樹生毛蟲埋蠶蛾於下或以洗魚水澆之即止石榴味甘酸澀性溫多食令人損肺傷齒令黑戀膈生痰凡服食藥物人忌之橘子味甘酸性溫多食戀膈生痰滯肺氣同螃蟹食令患軟癰同獺肉食令噁心勿與檳榔同食橘皮乾者名陳皮味苦辛性溫若多用久服能損元氣橘瓤上筋最難化小兒多食成積松毛裹橘留百日不幹緑豆亦可忌近酒米柑橙亦然橘下埋鼠則結實加倍柑子味甘性寒多食令脾寒成癖及肺寒咳嗽生痰發陰汗令大腸瀉痢即用柑皮煎湯或飲鹽湯可解多食柑皮令肺燥橙子味甘性寒多食傷肝氣發虛熱同獱肉食發頭旋噁心橙皮味苦辛性溫宿酒未解食之速醒食多反動氣勿同檳榔食香櫞味辛酸性溫揉蒜罨其蒂上則香更充溢浸汁浣葛紵勝似酸漿也佛手柑味辛甘性平與香櫞功用相同金柑味甘酸性溫藏緑豆中經時不變枇杷味甘酸性平多食動脾發痰助濕同麵食及炙肉食發黃病壅濕熱氣胡桃肉味甘衣澀性溫多食生痰涎動風氣脫眉發令人噁心吐水同酒食多令咯血動腎火連衣食斂肺氣不可合雉肉野鴨同食胡桃肉與銅錢共食即成粉食酸齒齼細嚼桃肉即解去衣法凡胡桃一斤用甘蔗節五六段和湯煮透經一宿次早略煮取去殼衣隨脫油胡桃有毒傷人咽肺楊梅味酸甘性溫多食發瘡助熱生痰損齒傷筋有火病者勿食忌與生蔥同食以柿漆拌核曝之仁自裂出櫻桃味甘澀性熱多食令人嘔吐立發暗風傷筋骨敗血氣助虛熱小兒食之過多無不作熱有寒熱病人不可食宿有濕熱病及喘嗽者食之加劇且有死者過食太多發肺癰肺痿其葉同老鵝煮易軟熟銀杏味甘苦澀性溫有小毒即白果生食引疳熟食多令人臚脹壅氣動風小兒食多昏霍發驚引疳同鰻鱺食患軟風妊婦食之滑胎銀杏能醉人食滿及千者死三稜者有毒臨炒時密取一枚手握炒不發爆生搗能浣衣帛油膩榛子味甘性平凡收藏榛松瓜仁類以燈心剪碎和入罐內放燥處不油松子味甘性溫多食生痰涎發虛熱不可同胡羊肉食凡松子細果將油者攤竹紙焙之還好棐子味甘澀性熱同鵝肉食患斷節風又令氣上壅反緑豆能殺人豬脂炒棐黑皮自脫同甘蔗食其渣自軟棐煮素羹味更甜美多食引火入肺大腸受傷也荔枝味甘性熱多食發熱煩渴口乾衄血鮮者尤甚令即齦腫口痛患火病及齒䘌人尤忌之食荔多則醉以殼浸水飲之即解荔枝熟時人未採則百蟲不敢近人才採動鳥烏蝙蝠蟲類無不傷殘之也故採荔枝者必日中衆採一日色變二日味變三日色味俱變若麝香觸之花實盡落也以針刺荔殼數孔蜜水浸瓷碗內隔湯蒸透肉滿甘美龍眼味甘性平生者用沸湯瀹過食不動脾龍荔味甘性熱有小毒狀如小荔枝而肉味如龍眼生食令人發癇或見鬼物橄欖味澀甘性溫多食令氣上壅過白露摘食不病瘧食橄欖去兩頭其性熱也得鹽不苦澀同栗子食甚香用錫盒收藏以紙封固置淨地上至五六月不壞橄欖樹高難採將熟時以木釘釘之或納鹽少許於根皮內其實一夕自落其枝節間有脂膏如桃膠採取和皮葉煎汁熬如黑餳謂之欖糖用黏船隙牢如膠漆著水益干其木作舟楫撥著魚皆浮出故橄欖能解一切魚毒梧桐子味甘性平生食無益多食生痰涎動風氣檳榔味苦辛澀性溫頭圓矮平者為榔形尖紫紋者為檳檳力小榔力大勿經火若熟使不如不用鴆鳥多集檳榔樹上其外皮即大腹皮也宜依法洗制方可用之檳榔得扶留藤瓦壟子灰同咀嚼之吐去紅水一口則柔滑甘美多食則發熱勿同橙橘食蓮肉味甘澀性平食蓮子不去心令人作吐多食生者微動冷氣脹人患霍亂及大便閉燥者少食荷梗塞穴鼠自去煎湯洗鑞垢自新蓮花及蕊須忌地黃蔥蒜花畏桐油藕味甘性平生食過多亦令冷中少和鹽水食益口齒同油炸米麵果食則無渣忌鐵器菱味甘性平生食多傷臟腑損陽氣痿莖生蟯蟲水果中最不治病熟食多令腹滯氣腹脹飲薑汁酒一二杯可解或含吳茱萸咽津亦妙同蜂蜜食生蝤蟲小兒秋後食多令臍下痛花開背日芡花開向日故菱寒而芡暖熟乾性平生則冷利四角三角為芰兩角為菱功用相同勿合犬肉食芡實味甘性平生食過多動風冷氣熟食過多不益脾胃兼難消化小兒多食令不長芡實一斗用防風四兩煎湯浸過經久不壞茨菰味苦甘性寒多食發虛熱及腸風痔漏崩中帶下令冷氣腹脹生瘡癤髮腳氣患癱瘓風損齒失顏色皮肉乾燥卒食之使人乾嘔孕婦忌食能消胎氣小兒食多令臍下痛以生薑同煮可解毒勿同吳茱萸食荸薺味甘性寒滑即地粟有冷氣人不可食令腹脹氣滿小兒秋月食多令臍下結痛合銅嚼之銅漸消也勿同驢肉食令筋急甜瓜味甘性寒滑有小毒多食發虛熱痼疾黃疸及陰下濕癢生瘡動宿疾癥癖損陽氣下痢令人虛羸手足乏力惙惙氣弱同油餅食作瀉病後食之成反胃患腳氣者食之難愈食多解藥力夏月過食深秋瀉痢最為難治凡瓜有兩鼻兩蒂者殺人五月瓜沉水者食之患冷病令終身不瘥九月被霜者食之冬病寒熱瓜性最寒曝而食之尤冷張華博物志云人以冷水漬至膝可頓啖瓜至數十枚漬至項其啖轉多水皆作瓜氣未知果否食瓜傷腹脹者食鹽花易消或飲酒或服麝香水可解西瓜味甘性寒胃弱者不可食多食作吐利發寒疝成霍亂冷病同油餅食損脾氣食瓜後食其子不噫瓜氣以瓜劃破曝日中少頃食即冷如冰近糯米沾酒氣即易爛貓踏之易沙葡萄味甘酸性微溫多食助熱令人卒煩悶昏目甘草作釘針葡萄立死以麝香入樹皮內結葡萄盡作香氣其藤穿過棗樹則實味更美葡萄架下不可飲酒防蟲屎傷人甘蔗味甘性微寒多食發虛熱動衄血同酒過食發痰同棐子食則渣軟燒蔗渣煙最昏目宜避之落花生味甘微苦性平形如香芋小兒多食滯氣難消近出一種落花生詭名長生果味辛苦甘性冷形似豆莢子如蓮肉同生黃瓜及鴨蛋食往往殺人多食令精寒陽痿香芋味甘淡性平多食泥膈滯氣小兒及産婦尤宜少食甘露子味甘性平即草石蠶不宜生食多食令生寸白蟲與諸魚同食令人吐或以蘿蔔滷及鹽菹水收之則不黑亦可醬漬蜜藏桑椹子味甘酸性微溫小兒多食令心痛黃精味甘微苦性平忌水蘿蔔太陽之草名黃精食之益人太陰之草名鉤吻食之即死勿同梅子食馬檳榔味甘苦性大寒又名馬金囊産婦忌食女人多食令子宮冷絶孕椰子漿味甘性溫食之昏昏如醉食其肉則不飢飲其漿則增渴菴羅果味甘性溫俗名香蓋西洛甚多多食動風疾凡時疾後食飽後俱不可食同大蒜辛物食令人患黃病諸果有毒凡果未成核者食之令人發癰癤及寒熱果落地有惡蟲緣過者食之令人患九漏果雙仁者有毒殺人瓜雙蒂者沉水者皆有毒殺人凡果忽有異常者根下必有毒蛇惡物其氣熏蒸所致食之立殺人解諸果之毒燒豬骨灰為末水服收藏青梅枇杷橄欖橙李菱瓜類以臘水入些少銅青末密封於淨罐內久留色不變或用臘水入薄荷明礬少許將諸果各浸甕內久藏味佳且不變色
