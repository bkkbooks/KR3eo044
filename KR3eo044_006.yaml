body:
  text: 卷六魚類鯉魚味甘性平其脅鱗一道從頭至尾無大小皆三十六鱗陰極則陽復故能發風動火同犬肉豆藿食令消渴同葵菜食害人天行病後及下痢者有宿癥者俱不可食風病人食之貽禍無窮服天門冬紫蘇龍骨硃砂人忌食鯉脊上兩筋及黑血有毒溪間生者毒在腦山上水中生者不可食炙鯉勿使煙入目大損目光三日內必驗鯉魚子合豬肝食能害人勿同雞肉雞子食鯽魚味甘性溫同蒜食助熱同沙糖食生疳蟲同芥菜食發浮腫同雞雉鹿猴肉及豬肝食生癰疽服麥門冬者食之害人鯽魚子忌同豬肝食鯿魚味甘性溫患疳痢者勿食鰣魚味甘性平多食發痼疾及瘡疥疳疾鱸魚味甘性平有小毒多食發瘡腫成痃癖勿同乳酪食肝不可食剝人面皮中鱸魚毒者多飲蘆根汁可解鱖魚味甘性平鬐刺凡十二以應十二月誤梗害人以橄欖核磨水服之可解鰱魚味甘性溫多食令人熱中發渴或發瘡疥鯖魚味性甘平作鮓與服石人相反勿與生胡荽麥醬豆藿生葵菜同食服術人忌之白魚味甘性平多食熱中生痰泥人膈發灸瘡同棗肉食令患腰腹痛經宿者勿食令人腹冷炙食亦少動氣患瘡癤者勿食能發膿回魚味甘性平多食動痼疾同野豬雉肉食令人發癩同鹿肉食殺人赤目赤須者忌食鮆魚味甘性溫多食助火動痰發瘡疾鯊魚味甘性平多食發瘡疥此魚大者四五寸小時即有子忌甘草鰷魚味甘性溫此魚長僅數寸形狹而扁狀如柳葉性好群遊多食發瘡疥丹毒鱠殘魚味甘性平鮮多食令人發瘡疥及小兒赤遊風曬乾者名銀魚又一種鱵魚形似鱠殘但喙上多生一針功用相同鱅魚味甘性溫狀似鰱而色黑其頭最大俗呼花鰱鰱之美在腹鱅之美在頭其目旁有乙骨食魚去乙是矣多食動風熱發瘡疥鱒魚味甘性溫一名赤眼魚多食動風氣助濕熱發瘡癤癬疥及痼疾鯇魚味甘性溫即草魚多食發諸瘡及濕毒流氣痰核病石首魚味甘性平俗名黃魚曝乾為白鯗食之能消瓜成水又一種黃花魚形狀相似但色黑耳勒魚味甘性平乾者謂之勒鯗甜瓜生者用勒魚骨插蒂上一夜便熟石首鯗骨亦然鯧魚味甘性平和生薑粳米煮骨皆軟其子有毒食之令人下痢杜父魚味甘性溫狀似鯊而短尾岐頭大口闊身黃黑有斑脊有刺患瘡癤者忌食脊有細蟲如發宜去之鱧魚味甘性寒即黑魚有瘡人不可食令瘢白食之無益能發痼疾鰻鱺魚味甘性微溫有小毒同白果食患軟風多食動風妊婦食之令胎有疾有重三四斤者昂頭三寸遊者四目者無腮者背有白點者腹有黑斑者並有毒食之殺人尖頭劍脊黑色者有毒食之無味其骨燒煙燻蚊令化為水熏氈及屋舍竹木斷蛀蟲置書笥衣箱不生蠹海鰻鱺性味相同暖而不補一種肉粗無油者有毒勿食乾者名風鰻鱓魚味甘性大溫即黃鱓多食令人霍亂發瘡疾動風氣損人壽時行病後食之復發勿與犬肉犬血同食妊婦食之令子聲啞黑而大者有毒食之殺人蓄水缸內夜以燈照通身浮水面項下有白點此乃蛇變者急宜棄之以蒜瓣投缸中則群鱓跳擲不已亦物性相制也煮鱓忌桑柴火食鱓中毒食蟹即解鰌魚味甘性平即泥鰍魚同白犬血肉食和燈心煮鰌甚妙忌桑柴煮鱣魚味甘性平有小毒即黃魚俗呼著甲魚多食生痰助熱發風動氣發瘡疥同蕎麥麵食令人失音作鮓食令人難克化服荊芥藥者忌之鱘魚味甘性平即鱘鰉魚一名鮪魚多食動風氣發一切瘡疥久食令人心痛腰疼同筍干食發癱瘓小兒食之成咳嗽及瘷瘕能發諸藥毒服丹石人忌食作鮓雖珍亦不益人鮎魚味甘性寒有小毒同牛肝食患風噎涎同野豬肉食令吐瀉同雉肉食生癰癤同鹿肉食令筋甲縮赤目赤須無腮者並有毒誤食殺人反荊芥黃顙魚味甘性平微毒一名䱀䰲狀似小鮎身青黃色腮下有二橫骨兩須有胃作聲軋軋其膽春夏近上秋冬近下多食發瘡疥不益人反荊芥能害人河豚味甘性溫有毒海中者有大毒多食發風助濕動痰有痼疾瘡瘍者不可食與荊芥菊花桔梗甘草附子烏頭相反修治失法誤入煙煤或沾灰塵食之並能殺人三月後即肉內生斑不可食之妊婦食之令子赤遊風其血有毒脂令舌麻子令腹脹眼令目花其肝及子有大毒入口爛舌入腹爛腸無藥可解中其毒者以橄欖蘆根汁糞清甘蔗汁解之少效或用鴨血灌下可解服藥人不可食之赤目者極肥大者腰腹有紅筋者誤食殺人諸藥不能解厚生者宜遠之勿食又一種斑子魚形似小河豚其性味有毒與河豚相同河豚魚飽後不可再食食此不可盡飽宜防發脹耳鱤魚味甘性平吞啖同類池中有此不能蓄魚生瘡癤者勿食石斑魚生南方溪澗長數寸白鱗黑斑浮游水面聞人聲則劃然深入其子及腸有毒誤食令人吐瀉飲魚尾草汁少許解之黃鯝魚味甘性溫此魚闊不逾寸長不近尺其油點燈令人昏目鱊魚味甘性平俗名春魚春月閒從巖穴中隨水流出狀似初化魚苗一斤千頭或云鯉魚苗也今宣城涇縣於三月三前後三四日亦出小魚土人炙收寄遠或即此魚金魚味甘鹹性平味短不宜食止堪養玩魚啖橄欖渣肥皂水鴿糞即死得白楊皮不生蝨比目魚味甘性平多食動風氣有風濕病者勿食鮹魚味甘性平尾有兩歧如鞭鞘患癰疽者勿食鮫魚味甘性平即沙魚皮可飾刀劍大者尾長數尺能傷人小者子隨母行驚即從口入母腹中虎沙能咬人形被暗傷人以紅布繫腰可免忌甘草烏賊魚味鹹性平多食動風氣其墨亦可書字但逾年則跡滅其骨名海螵蛸文順者是真橫者為假能淡鹽投骨於井水蟲皆死烏賊遇小滿則形小也邵陽魚味甘鹹性平有小毒狀如盤及荷葉無足無鱗背青腹白口在腹下目在額上尾長有節螫人甚毒吳人臘之食之無益其尾候人尿處訂之令陰腫痛至死拔去乃愈被刺毒者以魚扈竹及海獺皮解之竹魚味甘性平出廣南桂林湘江狀似鯖魚而少骨刺色青翠可愛鱗間有朱點多食發瘡疾鱉肉味甘性冷同豬兔鴨肉食損人同芥子食生惡瘡同莧菜食令腹中成肉鱉害人不可同桃子鴨子雞子食禮記云食鱉去醜謂頸下有軟骨如龜形食之令人患水病有冷氣癥瘕人不宜食之凡鱉三足者赤足者獨目者頭足不縮者目四陷者腹下有王字形十字文者腹有蛇紋者目白者山上生者名旱鱉並有毒食之殺人夏天亦有蛇化者食須慎之妊婦食之令子短項薄荷煮鱉能害人鱉無耳以目為聽純雌無雄以蛇黿為匹故燒黿脂可以致鱉遇蚊叮則死得蚊煮則爛熏蚊者又用鱉甲物相報復如此鼉一鳴而鱉伏性相制也池中有鱉魚不能飛其膽味辛辣破入湯中可代椒而闢腥其性畏蔥及桑灰甲無裙而頭足不縮者名曰納鱉有毒食之令人昏塞以吳藍煎湯服之立解甲亦有毒三足者名曰能鱉有大毒誤食殺人龜肉味酸性溫此物神靈不可輕殺六甲日十二月俱不可食損人神同豬肉菰米瓜莧食害人神龜版當心前一處四方透明如琥珀色者佳頭方腳短殼圓版白為陽頭尖腳長殼長版黃為陰其息以耳腸屬於首雌雄尾交亦與蛇匹龜老則神年至八百反大如錢龜聞鐵聲則伏蚊噆則死香油抹眼入水不沉老桑煮之易爛龜尿磨瓷器能令軟磨墨書石能入數分取龜尿以豬鬃或松葉刺其鼻即出金線緑毛龜置書笥闢蠹呷蛇龜甲肉俱毒不可食之黿肉味甘性平微毒裂而懸之一夜便覺垂長至地聞人聲則收腸屬於首以鱉為雌其脂摩鐵則明老能變魅非急弗食之螃蟹味甘鹹性寒有小毒多食動風發霍亂風疾人不可食妊婦食之損胎令子頭短及橫生不可同橘棗荊芥食同柿食令成冷積腹痛服木香汁可解未經霜蟹有毒腹中有蟲如小木鱉子而白者不可食大能發風有獨螯獨目四足六足兩目相向腹下有毛殼中有骨頭背有黑點足斑目赤者並有毒不可食中其毒者服冬瓜汁豉汁紫蘇汁蒜汁蘆根汁皆可解之糟蟹罐上放皂莢半錠可久留不壞罐底入炭一塊不沙見燈易沙得椒易䐈得皂莢或蒜及韶粉可免沙䐈得白芷則黃不散得蔥及五味子同煮則色不變其黃能化漆為水其螯燒煙可集鼠蟛蜞有毒食多發吐痢又有劍蟹之類並有毒不可食雄者臍長雌者臍圓腹中之黃隨月盈虧流水生者色黃而腥止水生者色紺而馨蚌肉味甘鹹性冷多食發風動冷氣馬刀肉有毒蜆肉味甘鹹性冷微毒多食發嗽及冷氣消腎蛤蜊味鹹性冷與丹石人相反食之令腹結痛以枇杷核同煮脫丁蟶肉味甘性溫天行病後不可食之蚶肉味甘性微溫多食令人壅氣同飯食不口乾車渠蓋瓦壟之大者作杯注酒滿過一分不溢淡菜味甘性溫多食令頭目昏悶得微利可已久食脫人發服丹石人食之令腸結燒食即苦不宜人以少米先煮熟後去毛再入蘿蔔或紫蘇或冬瓜同煮尤佳田螺味甘性大寒其肉視月盈虧有冷積人勿食小者名螺螄性味相同清明後其中有蟲不可食用也細長者名海螄味鹹性寒肉緑色鱟魚味辛鹹性平微毒多食令咳嗽發瘡癬其行雌常負雄失雌雄即不動取必雙得其血碧色尾有珠如粟燒脂可以集鼠蚊螫即死小者名曰鬼鱟食之害人海䖳味鹹性溫即海蜇無口眼腹翅塊然一物以蝦為目蝦去則住浸以石灰礬水則色白蝦肉味甘鹹性溫有小毒多食動風助火發瘡疾有病人及患冷積者勿食小兒食之令腳弱雞犬食之亦令腳屈弱生水田溝渠中者有毒切勿以熱飯盛密器內作鮓食毒人至死蝦無須者腹下通黑及煮熟色變白者並有毒不可食勿與鹿麞肉豬肉雞肉同食妊婦食之令子難産海蝦味甘鹹性平有小毒同豬肉食令人多唾閩中有五色蝦長尺余曝乾為對蝦功用相同蛙味甘性寒即田雞其骨熱食之令小便淋妊婦食之令子聲啞壽夭小蛙食多令人尿閉臍下痠痛有至死者擂車前水飲可解正月出者名黃蛤不可食漁人多以蟾蜍去皮僞充有毒勿食海參味甘鹹性寒滑患泄瀉痢下者勿食燕窩味甘性平黃黑黴爛者有毒勿食牡蠣肉味甘性溫俗呼鮑魚海牡蠣可用丈夫服之令人無髭鼉肉味甘性溫有小毒食之發冷氣痼疾此物有靈不可食之其涎最毒身具十二生肖肉唯蛇肉在尾最毒鯪鯉肉味甘澀性溫有毒即穿山甲其肉最動風風疾人才食數臠其疾一發四肢頓廢蚺蛇肉味甘性溫有小毒四月勿食其膾著醋能卷人筋唯以芒草作箸乃可諸魚有毒魚目有睫目能開合二目不同逆腮全腮無腮白鬐腦白連珠腹下丹字形形狀異常者並有毒食之殺人凡一切無鱗魚皆有毒宜少食之妊婦食之並難産育令子多疾也紫荊花入魚羹中食之殺人解諸魚毒黑豆汁馬鞭草汁橘皮大黃蘆根汁朴硝湯飲之皆可解凡中鰍鱓蝦鱉蝦蟆毒令臍下痛小便祕用豆豉一合煎濃汁頻飲之可解收藏銀魚鮆魚以干豬草一處不變色味藏白鯗以干稻柴同包凡洗魚滴生油數點則無涎煮時下沒藥少許則不腥
