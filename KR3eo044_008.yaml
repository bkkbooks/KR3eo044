body:
  text: 卷八獸類豬肉味苦性微寒有小毒牡曰豭牝曰彘子曰豚牡而去勢曰豶生江南者謂之江豬唯豭肉無毒多食閉血脈弱筋骨虛人肌疫病者金瘡者尤宜忌之久食令人少子傷精發宿疾豚肉久食令人遍體筋肉碎痛乏氣江豬多食令人體重作脯少有腥氣久食解藥力動氣發疾傷寒瘧痢痰痼痔漏諸疾食之必再發難愈反梅子烏梅桔梗黃連犯之令人瀉痢服胡黃連食之令人漏精服甘草者忌之同牛肉食生寸白蟲同兔肉食損人同羊肝同雞子同鯽魚及黃豆食令人滯氣同葵菜食令人少氣同蕎麥麵食患熱風脫須眉毛發同生姜食生面斑發風同胡荽食爛人臍同蒼耳食動風氣同百花菜同吳茱萸食發痔瘻同龜鱉肉麋鹿驢馬肉蝦子食傷人多食令人暴肥蓋虛風所致也頭肉有毒多食動風發疾豬肉毒在首故有病者忌之項肉俗名槽頭肉肥脆能動風脂膏勿令中水臘月者歷年不壞反烏梅梅子忌乾漆腦味甘性寒有毒禮記云食豚去腦能損男子陽道臨房不能行事酒後尤不可食今人以鹽酒食豬腦是引賊入室也血味鹹性平服地黃補骨脂何首烏諸補藥者忌之能損陽也同黃豆食滯氣心味甘鹹性平多食耗心氣不可合吳茱萸食肝味苦性溫豬臨殺驚氣入心絶氣歸肝俱不可多食服藥人勿食不可合雉肉雀肉及同魚膾食生癰疽同鯉魚鯽魚食傷神同鵪鶉食生面黚肺味甘性微寒同白花菜食令人氣滯發霍亂八月和飴食至冬發疽腎味鹹性冷即腰子久食令人傷腎少子虛寒者尤忌冬月食之損真氣發虛壅𦚠脂微毒男子多食損陽豬鼻唇多食動風氣凡花豬病豬白蹄豬自死豬煮汁黃者為黃鑣豬肉中有米星為俱不可食燒肉忌桑柴凡煮肉同皂莢子桑白皮高良薑黃蠟不發風氣得舊籬筏易熟煮肉封鍋入楮實子二三十粒易爛且香夏天用醋煮肉可留數日煮臘肉將熟以紅炭投鍋內則不油蘞氣洗豬肚用面洗腸臟用砂糖能去穢氣中病豬毒燒豬屎為末水服錢許三次可瘥過食豬肉傷燒豬骨為末水服或服芫荽汁生韭汁或加草果可消煮硬肉入山楂數顆易爛羊肉味甘性熱反半夏菖蒲同蕎麥麵豆醬食發痼疾同醋食傷人心同鮓鱠酪食害人熱病疫證瘧疾病後食之復發致危妊婦食之令子多熱病頭蹄肉味甘性平水腫人食之百不一愈冷病人勿多食妊婦食羊目令子睛白血味鹹性平凡豬羊血食久鼻中毛出晝夜長五寸漸如繩痛不可忍摘去復生唯用乳石硇砂等分為丸臨臥服十丸自落也服丹石人忌食羊血十年一食前功盡亡服地黃何首烏諸補藥者忌之能解胡蔓草毒腦有毒食之發風病和酒服迷人心成風疾男子食之損精氣少子白羊黑頭食其腦作腸癰羊心有孔者勿食能殺人羊肺三月至五月其中有蟲狀如馬尾長二三寸須去之不去食之令人痢下肝味苦性寒同豬肉及梅子小豆食傷人心同生椒食傷人五臟最損小兒同苦筍食病青盲妊婦食之令子多厄羊䐗和飯飲久食令人多唾清水成反胃作噎病凡煮羊肉用杏仁或瓦片則易爛同胡桃及萊蔔煮不臊同竹䶉煮助味以銅器煮食男子損陽女子暴下白羊黑頭黑羊白頭獨角者並有毒食之生癰中羊肉毒者飲甘草湯解之過食羊肉傷者多食棗子草果可消黃牛肉味甘性溫微毒食之發藥毒能病人牛夜鳴則㾞臭不可食牛病自死者血脈已絶骨髓已竭不可食之誤食令人生疔暴亡發痼疾痃癖洞下疰病瘟牛暴死者不可食獨肝者有大毒令人痢血至死北人牛瘦多以蛇從鼻灌故爾獨肝水牛則無之啖蛇牛毛髮白而後順者是也人乳可解其毒自死白首者食之殺人疥牛食之發癢黃牛水牛合豬肉及黍米酒食並生寸白蟲同韭薤食合生姜食損齒勿同栗子食黑牛白頭者大毒勿食水牛肉味甘性平忌同黃牛患冷人勿食蹄中巨筋多食令生肉刺牛乳味甘性微寒生飲令人利熱飲令人口乾氣壅溫飲可也不宜頓服與酸物相反令人腹中癥結患冷氣人勿食同魚食成積同醋食生瘕牛脂味甘溫微毒多食發痼疾瘡瘍牛腦味甘性溫微毒熱病死者勿食其腦令生腸癰牛肝勿同鮎魚食患風噎涎青牛腸胃合犬肉犬血食病人服仙茅者食牛肉牛乳令斑人鬢髮服牛膝人亦忌食之凡煮牛肉入杏仁蘆葉則易爛煮病牛入黃豆豆變黑色者殺人中疔疥牛毒用澤蘭根或甘菊根汁或豬牙灰水服或生菖蒲擂酒或甘草湯解之豬脂化湯亦可解毒過食牛肉所傷以稻草和草果煎濃湯多服可消牛乃有功於世仁人君子必宜戒食狗肉味酸鹹性溫服食人忌食九月食犬傷神反商陸同生蔥蒜食損人同菱食生癲白犬合海鮋食必得惡病勿炙食令消渴妊婦食之令子無聲且生蟲疫證及熱病後食之殺人勿同鯉魚鱓魚牛腸食令人多病春末夏初多猘犬宜忌食瘦犬有病發狂暴死無故自死者有毒殺人懸蹄犬傷人赤股而躁者氣躁犬目赤者並不可食白狗血和白雞肉烏雞肉白雞肝白羊肉蒲子羹等食皆病人白犬乳酒服能斷酒犬腎微毒內則云食犬去腎不利人也田犬長喙善獵吠犬短喙善守白犬虎紋黑犬白耳畜之家富貴純白者主凶斑青者識盜而咬凡食犬肉傷用杏仁二三兩帶皮研細熱湯二三盞拌勻三次服能使肉盡消犬智甚巧力能護家食之無益何必嗜之馬肉味辛苦性冷有毒同倉米稷米及蒼耳食必得惡病十有九死同姜食發氣嗽同豬肉食成霍亂患疥瘡下痢者食必加劇妊婦食之令子過月難産乳婦食之令子疳瘦馬生角無夜眼白馬青蹄白馬黑頭者並不可食令人癲馬鞍下肉色黑及馬自死者形色異常者並有毒食之殺人馬乳味甘性冷利同魚鱠食作瘕馬肝及鞍下肉有大毒食之殺人刷牙用馬尾令齒疏損近人多用燒灰揩拭最腐齒齦馬腦有毒食之令人發癲馬血有大毒生馬血入人肉中一二日便腫起連心即死有人剝馬傷手血入肉一夜致死馬肉上血洗不淨食之生疔腫馬汗有大毒患瘡人觸馬汗馬氣馬毛馬尿馬屎並令加劇馬汗入瘡毒攻心欲死者燒粟干灰淋汁浸洗出白沫乃毒去也食馬肉毒發而心悶者飲清酒則解飲濁酒則加或飲蘆根汁或嚼杏仁或煎甘草湯解之中馬肝毒者豬骨灰牡鼠屎豆豉狗屎灰人頭垢並水服可解中疔疥馬毒者澤蘭根汁豬牙灰甘菊根汁俱水服或生菖蒲酒解之馬食杜蘅善走食稻足重食鼠屎腹脹食雞糞生骨眼以殭蠶烏梅拭牙則不食得桑葉乃解掛鼠狼皮於槽亦不食遇死馬骨則不行以豬槽飼馬石灰泥馬槽馬汗著門並令馬落駒系獼猴於廄闢馬病馬頭骨埋於午地宜蠶浸於上流絶水蜞蟲驢肉味甘性平與荊芥茶相反同食殺人同鳧茈食令人筋急多食動風脂肥尤甚屢試屢驗凡驢無故自死者疫死者力乏病死者並有毒忌食疥癩及破爛瘦捐者食之生疔腫將熱驢血和麻油一盞攪去沫煮熟成白色亦一異也妊婦食之令子難産勿同豬肉食傷氣騾肉味辛苦性溫有小毒其性頑劣肉不益人多食令人健忘妊婦食之難産騾大於驢而健於馬其力在腰其後有鎖骨不能開故不孳乳牡驢交馬而生者騾也牡馬交驢而生者為駃騠牡驢交牛而生者為馲𩢷牡牛交驢而生者為䮰𩥃牡牛交馬而生者為驅驉今俗通呼為騾矣鹿肉味甘性溫二月至八月不可食發冷痛白臆者豹文者並不可食鹿肉脯炙之不動及見水而動或曝之不燥者並殺人同雉肉蒲白鮠魚鮎魚雞肉生菜鯽魚蝦食發惡瘡禮記云食鹿去胃鹿茸不可以鼻嗅之中有小白蟲視之不見入人鼻必為蟲顙藥不及也不可近丈夫陰令痿鹿脂亦不可近陰久食鹿肉服藥必不得力為其食解毒之草故也勿同豬肉食麋肉味甘性溫多食令人弱房髮腳氣妊婦食之令子目病不可合豬肉雉肉鮠魚雞肉菰蒲食發痼疾同蝦及生菜梅李食損男子精氣麋脂不可近陰令痿亦不可同桃李食淮南子云孕婦見麋生子四目虎肉味酸作土氣性熱正月食虎傷神熱食虎肉傷人齒多有藥箭傷者食者慎之虎鼻懸門中次年取熬作屑與婦食之便生貴子勿令人及婦知知則不靈虎豹皮上睡令人神驚其毛入瘡有大毒虎骨勿用中毒藥箭者能傷人也虎夜視一目放光一目看物聲吼如雷風從而生百獸震恐立秋始嘯仲冬始交虎不再交孕七月而生虎生三子一為豹其搏物三躍不中則捨之食狗則醉聞羊角煙則走惡其臭也虎害人獸而蝟鼠能制之智無大小也豹肉味酸性微溫正月勿食傷神損壽豹肉令人志性粗豪食之便覺少頃消化乃定久食亦然豹脂合生發藥朝塗暮生廣西南界有唼臘蟲食死人尸不可驅逐以豹皮覆之則畏而不來野豬肉味甘性平多食微動風疾不可同回魚鮎魚食青蹄者不可食服巴豆藥者忌之嶺南一種懶婦似山豬而小善害田禾唯以機軸紡織之器置田所則不復近也豪豬肉味甘性大寒有毒不可多食發風令人虛羸助濕冷病駝肉及峰脂味甘性溫能知泉源水脈風候凡伏流人所不知駝以足踏處即得之流沙夏多熱風行旅遇之即死風將至駝必聚鳴埋口鼻於沙中人以為驗也其臥而腹不著地屈足露明者名明駝最能行遠駝糞亦直上如狼煙駝黃味苦性平微毒似牛黃而不香戎人以亂牛黃而功不及之熊肉味甘性平十月食之傷神患寒熱積聚痼疾者食之令終身不除也熊脂味甘性微寒寒月則有夏月則無之然燈煙損人眼令失光明熊掌難腝得酒醋水三件同煮熟即大如皮毬且易軟也熊膽春近首夏在腹秋在左足冬在右足熊行山中必有跧伏之所謂之熊館性惡穢物及傷殘捕者置此物於穴則合穴自死或為棘刺所傷出穴爪之至骨即斃也山羊肉味甘性熱疫病後忌食妊娠食之令子多病肝尤忌之羚羊肉味甘性平其角能碎佛牙貘骨金剛石燒煙走蛇虺也麂肉味甘性平多食發痼疾妊婦食之令胎墮麞肉味甘性溫十二月至七月食之動氣多食發消渴及痼疾瘦惡者勿食同鴿食成瘕同梅李生菜蝦食並能病人凡人心膽粗豪者以其心肝食之即減膽小者食之愈怯香麞肉味甘性溫蠻人食之不畏蛇毒臍名麝香忌大蒜麝不可近鼻有白蟲入腦患癩久帶其香透關令人成異疾能墮胎消瓜果食積闢蛇豬獾肉味甘酸性平其耳聾見人乃走能孔地食蟲蟻瓜果其肉帶土氣狗獾性味與貒相同貒即豬獾兔肉味甘辛性寒同白雞肉及肝心食令人面黃同獺肉食成遁尸病與姜橘同食令人心痛霍亂忌同鹿肉鱉肉芥菜及子末食十一月至七月食之傷神氣兔死而眼合者殺人食兔臏多令人面生臏骨內則云食兔去尻不利人也妊婦不可食令子缺唇主逆生兔尻有孔子從口出故妊婦忌之非獨為缺唇也久食絶人血脈損元氣陽事令人痿黃兔肝亦勿與雞芥胡桃柑橘同食山獺肉不宜食其陰莖為補助要藥骨解藥毒研少許敷之立消水獺肉味甘鹹性寒多食消男子陽氣勿同橙橘雞肉雞子兔肉食其肝有毒諸畜肝皆有定數唯獺肝一月一葉十二月十二葉其間又有退葉或云獱獺無雌以猿為匹故猿鳴而獺候象肉味甘淡性平多食令人體重象具百獸肉唯鼻是其本肉象膽幹了上有竹文斑光膩春在前左腿夏在前右腿秋在後左腿冬在後右腿牙近鼠類鼠皮則裂世人知然犀可見水怪而不知沉象可驅水怪夏月合藥宜置象牙於傍合丹灶以象牙夾灶得雷聲乃能發光豺肉味酸性熱有毒食之損人精神消人脂肉令人瘦狼肉味酸性熱內則云食狼去腸不利人也其糞燒煙直上狐肉味甘性溫有小毒禮記云食狐去首為害人也人卒暴亡即取雄狐膽溫水研灌入喉即活移時者無及矣貍肉味甘性溫正月勿食傷神反藜蘆細辛食貍去正脊不利於人貍類甚多性味相同家貓肉味甘酸性溫肉味不佳亦不入食品畜之者以虎形利齒尾長腰短目如金銀上齶多稜者為良其睛可定時辰子午卯酉如一線寅申巳亥如滿月辰戌丑未如棗核也其鼻端常冷唯夏至一日則暖性畏寒不畏暑能畫地卜食隨月旬上下齧鼠其孕兩月而生貓有病以烏藥水灌之可愈也貉肉味甘性溫貉逾汶即死土氣使然也其耳亦聾與獾貒性味相同野馬肉味甘性平有小毒食之無益如家馬肉但落地不沾沙耳犀肉味苦酸鹹性寒妊婦勿服能消胎氣凡蠱毒之鄉飲食中以角攪之有毒則生白沫以之煮毒藥則無毒也忌鹽老鼠肉味甘性熱誤食鼠骨能令人瘦鼠涎有毒若飲食收藏不密涎墜其中食之令人生鼠瘻或發黃如金鼠糞有小毒食中誤食令人目黃成疸被鼠食殘之物人忌食之土撥鼠肉味甘性平雖肥而煮之無油味多食難克化微動風貂鼠肉味甘性平其毛皮寒月服之得風更暖著水不濡得雪即消拂面如焰塵沙迷目拭眯即出近火則毛易脫黃鼠肉味甘性平昔為上供今不甚重之多食能發瘡黃鼠狼肉味甘羶臭性溫有小毒不堪食蝟肉味甘性平誤食其骨令人瘦劣諸節漸小諸肉有毒六畜自死首北向諸畜帶龍形六畜自死口不閉六畜疫病疔疥死獸歧尾諸獸赤足諸畜肉中有米星獸並頭禽獸肝青諸獸中毒及藥箭死脯沾屋漏米甕中肉脯六畜肉熱血不斷祭肉自動諸肉經宿未煮六畜五臟著草自動脯嚗不燥生肉不斂水六畜肉得咸酢不變色肉煮熟不斂水肉煮不熟六畜肉墮地不沾塵肉落水浮肉汁器盛閉氣乳酪煎膾六畜肉與犬不食者以上並不可食殺人輕則病人生癰腫疔毒諸腦損陽滑精經夏臭脯痿人陰成水病諸脂然燈損目食本生命肉令人神魂不安春不食肝夏不食心秋不食肺冬不食腎四季不食脾解諸肉毒伏龍肝末本畜干屎末黃柏末赤小豆燒末東壁土末頭垢一錢起死人白扁豆末並水服飲人乳汁豆豉汁服之亦能解之藥箭毒以大豆煎汁或鹽湯食肉不消還飲本汁或食本獸腦即消
